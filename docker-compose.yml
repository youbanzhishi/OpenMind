version: "3.8"

services:
  openmind:
    build: .
    ports:
      - "9090:9090"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=sqlite:///data/openmind.db
      - RUST_LOG=info
    volumes:
      - openmind-data:/data
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  openmind-data:
  qdrant-data:
